issueNumber: MDL-88604
notes:
  core_course:
    - message: >-
        New get_all_section_cms function has been added to course_navigation
        class to get all course modules of the given section in order, including
        also activities inside subsections
      type: improved
    - message: >-
        New get_adjacent_section() function has been added to course_navigation
        class to get an adjacent section of a course in the given direction.
      type: improved
    - message: >-
        New is_first_navigable() function has been added to course_navigation
        class to know whether a module is considered the first accessible element
        of a course.
      type: improved
    - message: >-
        New is_last_navigable() function has been added to course_navigation class
        to know whether a module is considered the last accessible element of a
        course.
      type: improved
    - message: >-
        New get_section() function has been added to get the main section
        (not delegated) of a course module in the course_navigation class.
      type: improved
